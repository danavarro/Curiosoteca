<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="favGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a29bfe;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Librería/Estante -->
  <rect x="50" y="45" width="100" height="110" rx="8" fill="none" stroke="url(#favGrad)" stroke-width="8"/>

  <!-- División central -->
  <line x1="100" y1="45" x2="100" y2="155" stroke="url(#favGrad)" stroke-width="4" opacity="0.6"/>

  <!-- Estantes horizontales -->
  <line x1="50" y1="80" x2="150" y2="80" stroke="url(#favGrad)" stroke-width="3" opacity="0.4"/>
  <line x1="50" y1="105" x2="150" y2="105" stroke="url(#favGrad)" stroke-width="3" opacity="0.4"/>
  <line x1="50" y1="130" x2="150" y2="130" stroke="url(#favGrad)" stroke-width="3" opacity="0.4"/>

  <!-- Estrella principal -->
  <g transform="translate(100, 100)">
    <polygon points="0,-18 5,-6 18,-4 10,4 13,18 0,12 -13,18 -10,4 -18,-4 -5,-6" fill="url(#favGrad)"/>
  </g>

  <!-- Estrellas pequeñas -->
  <g transform="translate(70, 65)">
    <polygon points="0,-6 1.5,-2 6,-1 3,2 4,6 0,4 -4,6 -3,2 -6,-1 -1.5,-2" fill="url(#favGrad)" opacity="0.7"/>
  </g>

  <g transform="translate(130, 75)">
    <polygon points="0,-5 1.2,-1.5 5,-0.8 2.5,1.5 3,5 0,3 -3,5 -2.5,1.5 -5,-0.8 -1.2,-1.5" fill="url(#favGrad)" opacity="0.7"/>
  </g>
</svg>
