<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Curiosoteca: Descubre curiosidades fascinantes sobre ciencia, astronomía, animales y más. Datos que te sorprenderán.">
  <meta name="theme-color" content="#6c5ce7">
  <meta property="og:title" content="Curiosoteca — Descubre Curiosidades Fascinantes">
  <meta property="og:description" content="Explora un universo de curiosidades sorprendentes.">
  <meta property="og:type" content="website">
  <title>Curiosoteca — Descubre Curiosidades Fascinantes</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-content">
      <div class="logo-container">
        <svg class="logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#6c5ce7;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#a29bfe;stop-opacity:1" />
            </linearGradient>
          </defs>
          <path d="M 60 50 L 60 150 Q 60 160 70 160 L 130 160 Q 140 160 140 150 L 140 50 Q 140 40 130 40 L 70 40 Q 60 40 60 50"
                fill="none" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M 70 50 L 70 150 Q 70 155 75 155 L 100 155 L 100 45 L 75 45 Q 70 45 70 50"
                fill="none" stroke="url(#grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
          <path d="M 130 50 L 130 150 Q 130 155 125 155 L 100 155 L 100 45 L 125 45 Q 130 45 130 50"
                fill="none" stroke="url(#grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
          <line x1="100" y1="45" x2="100" y2="155" stroke="url(#grad)" stroke-width="1.5" opacity="0.5"/>
          <g transform="translate(85, 95)">
            <polygon points="0,-12 3.5,-4 12,-2 7,4 9,12 0,8 -9,12 -7,4 -12,-2 -3.5,-4"
                     fill="url(#grad)" opacity="0.9"/>
          </g>
          <g transform="translate(115, 75)">
            <polygon points="0,-8 2.3,-2.5 8,-1.3 4.5,2.5 5.5,8 0,5.3 -5.5,8 -4.5,2.5 -8,-1.3 -2.3,-2.5"
                     fill="url(#grad)" opacity="0.6"/>
          </g>
          <g transform="translate(75, 125)">
            <polygon points="0,-8 2.3,-2.5 8,-1.3 4.5,2.5 5.5,8 0,5.3 -5.5,8 -4.5,2.5 -8,-1.3 -2.3,-2.5"
                     fill="url(#grad)" opacity="0.6"/>
          </g>
        </svg>
      </div>
      <h1>CuriosoTeca</h1>
      <p class="subtitle">Descubre curiosidades fascinantes sobre el mundo</p>
    </div>
  </header>

  <main>
    <section class="search-section">
      <input
        type="text"
        id="searchInput"
        placeholder="Busca una curiosidad... ej: pulpo, sol, espacio"
        autocomplete="off"
      >

      <div class="categories" id="categoryButtons">
        <button class="category-btn active" data-category="all">Todas</button>
        <button class="category-btn" data-category="ciencia">Ciencia</button>
        <button class="category-btn" data-category="astronomia">Astronomía</button>
        <button class="category-btn" data-category="animales">Animales</button>
      </div>
    </section>

    <section id="randomSection">
      <button id="randomBtn">✨ Descubre algo nuevo</button>
    </section>

    <section id="results" class="results-grid">
      <div class="loading-spinner"></div>
      <p class="loading">Cargando curiosidades...</p>
    </section>
  </main>

  <footer>
    <div class="footer-content">
      <div class="footer-main">
        <h3>Curiosoteca</h3>
        <p>Datos, ciencia y curiosidades que te sorprenderán</p>
      </div>
      <p class="footer-credit">© 2026 Curiosoteca — Hecho con curiosidad y pasión</p>
    </div>
  </footer>

  <div id="modalOverlay" class="modal-overlay">
    <div class="modal-wrapper">
      <button id="modalClose" class="modal-close">&times;</button>
      <div class="modal-box">
        <img id="modalImage" class="modal-image" src="" alt="">
        <span id="modalCategory" class="card-category"></span>
        <p id="modalText" class="modal-text"></p>
        <div id="modalDetails" class="modal-details"></div>
        <div id="modalSources" class="modal-sources"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
